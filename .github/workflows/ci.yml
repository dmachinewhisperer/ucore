name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ukernel:
    name: ukernel · py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Build wheel
        working-directory: ukernel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel into a fresh env
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install ukernel/dist/*.whl

      - name: Verify kernelspec auto-discovery
        run: |
          /tmp/smoke/bin/jupyter kernelspec list
          /tmp/smoke/bin/jupyter kernelspec list | grep -q '^\s*ucore\b' \
            || { echo "::error::ucore kernelspec not discovered"; exit 1; }

      - name: Verify package imports + install CLI surface
        run: |
          /tmp/smoke/bin/python -c "from ukernel.pipes import live_plot, open, stop_live"
          /tmp/smoke/bin/python -m ukernel install --help

  firmware:
    name: firmware · ${{ matrix.board }}
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.2
    strategy:
      fail-fast: false
      matrix:
        board: [ESP32_GENERIC, ESP32_GENERIC_S3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Build (${{ matrix.board }})
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py -DMICROPY_BOARD=${{ matrix.board }} build

      - name: Merge into single flashable .bin
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py -DMICROPY_BOARD=${{ matrix.board }} \
                 merge-bin -o ucore-${{ matrix.board }}.bin

      - name: Upload merged binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: firmware/build/ucore-${{ matrix.board }}.bin
          if-no-files-found: error
          retention-days: 14

  docs:
    name: docs · build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: pip install -r docs/requirements.txt

      - name: Build site (strict — fail on broken refs)
        run: mkdocs build --strict
