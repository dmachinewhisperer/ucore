name: CI · firmware

on:
  push:
    branches: [main, develop]
    paths:
      - 'firmware/**'
      - '.github/workflows/ci-firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/ci-firmware.yml'

concurrency:
  group: ci-firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    name: firmware · ${{ matrix.board }}
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.2
    strategy:
      fail-fast: false
      matrix:
        board: [ESP32_GENERIC, ESP32_GENERIC_S3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Build (${{ matrix.board }})
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py -DMICROPY_BOARD=${{ matrix.board }} build

      - name: Merge into single flashable .bin
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py -DMICROPY_BOARD=${{ matrix.board }} \
                 merge-bin -o ucore-${{ matrix.board }}.bin

      - name: Upload merged binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: firmware/build/ucore-${{ matrix.board }}.bin
          if-no-files-found: error
          retention-days: 14
