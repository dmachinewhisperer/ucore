name: Deploy docs

# Builds and deploys the docs site to GitHub Pages on every push to main.
# Develop pushes do NOT deploy — they're verified by ci.yml's `docs · build
# check` job which runs `mkdocs build --strict` without publishing.
#
# Pages must be configured to "GitHub Actions" as the source (not branch).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
