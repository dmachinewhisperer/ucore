name: Release

# Tag-driven. Push a `vX.Y.Z` tag to cut a release: builds the wheel and
# all supported firmware binaries, then attaches everything to a GitHub
# Release named after the tag. Asset filenames intentionally OMIT the
# version so docs/manifest.json's `/releases/latest/download/<name>.bin`
# URLs stay stable across releases without redeploying the site.
#
# PyPI publishing is intentionally NOT wired up yet — wheel is attached
# to the Release as an artifact for now.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the Release + upload assets

jobs:
  wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sanity-check tag matches pyproject.toml version
        working-directory: ukernel
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c "import tomllib; \
            print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pkg"
            exit 1
          fi

      - name: Build wheel + sdist
        working-directory: ukernel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: ukernel/dist/*

  firmware:
    name: Build firmware · ${{ matrix.board }}
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: ESP32_GENERIC
            asset: ucore-esp32-generic.bin
          - board: ESP32_GENERIC_S3
            asset: ucore-esp32-s3.bin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build + merge_bin
        working-directory: firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py -DMICROPY_BOARD=${{ matrix.board }} build
          idf.py -DMICROPY_BOARD=${{ matrix.board }} \
                 merge-bin -o ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: firmware/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [wheel, firmware]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir release
          cp artifacts/wheel/* release/
          cp artifacts/firmware-*/*.bin release/
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
